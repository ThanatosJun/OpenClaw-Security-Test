# 受害者端 Docker Compose（在學校實驗室機器執行）
# 只包含 OpenClaw，使用 Gemini API
#
# 使用前：
#   export GOOGLE_API_KEY=your_gemini_api_key
#   docker compose -f docker-compose.lab.yml up -d
#   docker exec -it openclaw openclaw setup   # 首次初始化
#   docker exec -it openclaw openclaw chat    # 開始對話

services:
  openclaw:
    build: ./openclaw
    image: indirectclaw
    container_name: openclaw
    working_dir: /root
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    volumes:
      # OpenClaw 設定（掛目錄讓 inode 問題不影響）
      - ./openclaw:/root/.openclaw-init:ro
      # 保留 workspace 和 session 資料（用於 demo 的對話歷史 + 圖片）
      - openclaw-workspace:/root/.openclaw/workspace
      - openclaw-sessions:/root/.openclaw/agents
      # 機密資料夾（攻擊目標）：掛載 seed-data/ 至 workspace 內讓 agent 可存取
      - ./seed-data:/root/.openclaw/workspace/secrets
    ports:
      - "28789:18789"   # Gateway（主機 port 28789，避免與其他人衝突）
      - "28790:18790"   # Gateway 備用
      - "28791:18791"   # Browser control / Web UI
    stdin_open: true
    tty: true

volumes:
  openclaw-workspace:
  openclaw-sessions:
