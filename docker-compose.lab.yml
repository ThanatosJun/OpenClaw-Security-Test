# 受害者端 Docker Compose（在學校實驗室機器執行）
# 只包含 OpenClaw，使用 Gemini API
#
# 使用前：
#   export GOOGLE_API_KEY=your_gemini_api_key
#   docker compose -f docker-compose.lab.yml up -d
#   docker exec -it openclaw openclaw setup   # 首次初始化
#   docker exec -it openclaw openclaw chat    # 開始對話

services:
  openclaw:
    image: node:22-slim
    container_name: openclaw
    working_dir: /root
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    volumes:
      # OpenClaw 設定（包含 Gemini API 設定）
      - ./openclaw/openclaw.json:/root/.openclaw/openclaw.json:ro
      # 保留 workspace 和 session 資料（用於 demo 的對話歷史 + 圖片）
      - openclaw-workspace:/root/.openclaw/workspace
      - openclaw-sessions:/root/.openclaw/agents
      # 機密資料夾（攻擊目標）：掛載 seed-data/ 至容器內 ~/secrets
      - ./seed-data:/root/secrets
    stdin_open: true
    tty: true
    # 首次執行：安裝 openclaw 後常駐
    command: >
      sh -c "npm install -g openclaw@latest && tail -f /dev/null"

volumes:
  openclaw-workspace:
  openclaw-sessions:
